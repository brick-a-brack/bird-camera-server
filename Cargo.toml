[package]
name = "bird-camera-server"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
image = { version = "0.25", default-features = false, features = ["jpeg"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
windows = { version = "0.62", features = [
	"Win32_Foundation",
	"Win32_Media_MediaFoundation",
	"Win32_System_Com",
] }
