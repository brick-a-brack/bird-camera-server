name: Build

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  CANON_EDSDK_MACOS_URL: "https://uploads.brickfilms.com/files/1/29d5aec8-edsdkv132010m.zip"
  CANON_EDSDK_WINDOWS_URL: "https://uploads.brickfilms.com/files/1/a3039b9f-edsdkv132010w.zip"
  CANON_EDSDK_LINUX_URL: "https://uploads.brickfilms.com/files/1/a0d2f38c-edsdkv132010l.zip"

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Universal Binary (x86_64 + arm64)
  # The Canon EDSDK.framework ships as a universal binary, so a single output
  # binary works natively on both Intel and Apple Silicon Macs.
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Download Canon EDSDK
        run: |
          curl -fsSL "${{ env.CANON_EDSDK_MACOS_URL }}" -o canon_sdk.zip
          unzip -q canon_sdk.zip -d external/EDSDK/

      - name: Build x86_64
        run: |
          cargo build --release \
            --target x86_64-apple-darwin \
            --features backend-webcam-macos,backend-canon

      - name: Build arm64
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            --features backend-webcam-macos,backend-canon

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/toucan-camera-server \
            target/aarch64-apple-darwin/release/toucan-camera-server \
            -output toucan-camera-server-macos

      - name: Package into zip
        run: |
          mkdir -p dist/toucan-camera-server-macos

          cp toucan-camera-server-macos dist/toucan-camera-server-macos/toucan-camera-server

          # Add a relative rpath so the binary finds EDSDK.framework next to itself
          # when run outside the build tree.
          install_name_tool \
            -add_rpath @executable_path \
            dist/toucan-camera-server-macos/toucan-camera-server

          # Canon framework — only if present (SDK installed in CI)
          FRAMEWORK_SRC="external/EDSDK/EDSDKv132010M/EDSDK.framework"
          if [ -d "$FRAMEWORK_SRC" ]; then
            cp -R "$FRAMEWORK_SRC" dist/toucan-camera-server-macos/
          fi

          cd dist
          zip -r toucan-camera-server-macos.zip toucan-camera-server-macos/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-macos
          path: dist/toucan-camera-server-macos.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — x86_64
  # Canon EDSDK only ships for x86_64 on Windows. ARM64 Windows users can run
  # the x86_64 binary via the built-in x64 emulation layer.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Canon EDSDK
        run: |
          Invoke-WebRequest -Uri "$env:CANON_EDSDK_WINDOWS_URL" -OutFile canon_sdk.zip
          Expand-Archive canon_sdk.zip -DestinationPath external\EDSDK\

      - name: Build x86_64
        run: |
          cargo build --release `
            --target x86_64-pc-windows-msvc `
            --features backend-webcam-windows,backend-canon

      - name: Package into zip
        shell: pwsh
        run: |
          $out = "dist\toucan-camera-server-windows"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          Copy-Item "target\x86_64-pc-windows-msvc\release\toucan-camera-server.exe" $out

          # Canon DLLs — only if they were copied by build.rs (SDK present)
          $dlls = @("EDSDK.dll", "EdsImage.dll")
          foreach ($dll in $dlls) {
            $src = "target\x86_64-pc-windows-msvc\release\$dll"
            if (Test-Path $src) {
              Copy-Item $src $out
            }
          }

          Compress-Archive -Path "$out\*" -DestinationPath "dist\toucan-camera-server-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-windows
          path: dist/toucan-camera-server-windows.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Attach to current draft release
  # Runs on master/dev pushes. Finds the most recent draft release and uploads
  # built binaries to it. Does nothing if no draft release exists.
  # ---------------------------------------------------------------------------
  release:
    name: Attach to draft release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-macos
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-windows
          path: dist/

      - name: Attach assets to current draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName,isDraft,createdAt \
            --jq 'map(select(.isDraft == true)) | sort_by(.createdAt) | last | .tagName // empty')

          if [ -n "$DRAFT_TAG" ]; then
            echo "Draft release found ($DRAFT_TAG) — uploading assets"
            gh release upload "$DRAFT_TAG" \
              dist/toucan-camera-server-macos.zip \
              dist/toucan-camera-server-windows.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "No draft release found — skipping upload"
          fi
